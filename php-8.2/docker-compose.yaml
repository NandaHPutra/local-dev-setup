services:
  php82:
    image: php:8.2-fpm
    container_name: php82
    restart: unless-stopped
    user: "1000:1000"

    ports:
      - "9082:9000"

    volumes:
      - ${PROJECTS_PATH}:/var/www
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini

    environment:
      - PHP_IDE_CONFIG=serverName=Docker

    working_dir: /var/www

    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge
