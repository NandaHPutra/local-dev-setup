services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    user: "1000:1000"

    ports:
      - "6379:6379"

    volumes:
      - ./data:/data

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
