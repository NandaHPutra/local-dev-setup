services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ${PROJECTS_PATH}:/var/www
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
      - ./logs:/var/log/nginx

    networks:
      - dev-network

    depends_on:
      - php74
      - php80
      - php82
      - php84

networks:
  dev-network:
    driver: bridge
    external: true
