# Default catch-all server for projects without specific config
# Useful for quick testing

server {
    listen 80 default_server;
    server_name _;
    root /var/www;

    index index.php index.html;

    location / {
        autoindex on;  # Show directory listing
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Try to find the PHP file, if not found, try different PHP versions
        fastcgi_pass php82:9000;  # Default to PHP 8.2
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
